<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 12px; }
        .form-control { background-color: #0d1117; border-color: #30363d; color: #c9d1d9; font-size: 1.1rem; }
        .form-control:focus { background-color: #0d1117; color: #f0f6fc; box-shadow: 0 0 0 3px rgba(88,166,255,0.15); border-color: #58a6ff; }
        .outcome-item { background-color: #21262d; border-left: 4px solid #ffc107; padding: 12px 18px; margin-bottom: 10px; border-radius: 0 8px 8px 0; font-size: 1.1rem; color: #f0f6fc; font-weight: 500; }
        .loader { display: none; }
        .output-section { display: none; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            
            <div class="text-center mb-5">
                <h1 class="fw-bold text-white">Tyga</h1>
                <p class="text-secondary">know possile outcomes for any scenario.</p>
            </div>

            <div class="card p-4 shadow-lg mb-5">
                <div class="mb-3">
                    <label for="eventInput" class="form-label fw-bold text-secondary">What's the situation/action?</label>
                    <textarea id="eventInput" class="form-control" rows="3" placeholder="e.g., I slapped an important person..."></textarea>
                </div>
                <button id="btnRun" onclick="simulateRealities()" class="btn btn-warning btn-lg w-100 fw-bold text-dark">Calculate Outcomes</button>
                
                <div id="loader" class="text-center loader mt-3">
                    <div class="spinner-border text-warning" role="status"></div>
                    <p class="text-secondary mt-2 small">Running secure simulation...</p>
                </div>
            </div>

            <div id="outputArea" class="output-section">
                <h4 class="mb-3 text-secondary fw-bold">Possible Outcomes:</h4>
                <div id="possibilitiesList"></div>
            </div>

        </div>
    </div>
</div>

<script>
async function simulateRealities() {
    const input = document.getElementById('eventInput').value.trim();
    const btn = document.getElementById('btnRun');
    const loader = document.getElementById('loader');
    const output = document.getElementById('outputArea');
    const listContainer = document.getElementById('possibilitiesList');

    if (!input) return alert("Please type an action first!");

    btn.innerText = "Calculating...";
    btn.disabled = true;
    loader.style.display = 'block';
    output.style.display = 'none';
    listContainer.innerHTML = ''; 

    try {
        // Automatically references your cloud file route
        const response = await fetch('/api/simulate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: input })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error);

        data.outcomes.forEach(line => {
            const item = document.createElement('div');
            item.className = 'outcome-item shadow-sm';
            item.innerText = line;
            listContainer.appendChild(item);
        });

        output.style.display = 'block';

    } catch (error) {
        console.error(error);
        alert(`Simulation Error: ${error.message}`);
    } finally {
        btn.innerText = "Calculate Outcomes";
        btn.disabled = false;
        loader.style.display = 'none';
    }
}
</script>
</body>
</html>
